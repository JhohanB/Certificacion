<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - CertiAgro</title>
  <link rel="stylesheet" href="./assets/css/styles.min.css" />

  <style>
    body {
      background-color: #F4F6F8;
    }

    .btn-primary-custom {
      background-color: #2F7D32;
      border: none;
      color: white;
    }

    .btn-primary-custom:hover {
      background-color: #256628;
      color: white;
    }

    .form-control:focus {
      border-color: #2F7D32;
      box-shadow: 0 0 0 0.2rem rgba(47,125,50,0.25);
    }
  </style>
</head>

<body>

  <!-- Header coherente con index -->
  <header class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
    <div class="d-flex align-items-center">
      <img src="./assets/images/logos/logo_sena.png" height="40">
      <h5 class="ms-3 mb-0 fw-bold text-dark">Certificación</h5>
    </div>
  </header>

  <!-- Contenido -->
  <div class="d-flex justify-content-center align-items-center"
       style="min-height:85vh;">

    <div class="card shadow-lg border-0 p-5"
         style="max-width:450px; border-radius:12px;">

      <h2 class="text-center fw-bold mb-4"
          style="color:#2F7D32;">
        Acceso Funcionarios
      </h2>

      <form id="login-form">

        <div class="mb-3">
          <label class="form-label fw-bold">Usuario</label>
          <input type="email"
                 class="form-control"
                 id="username-input"
                 required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Contraseña</label>
          <input type="password"
                 class="form-control"
                 id="password-input"
                 required>
        </div>

        <div id="error-message"
             class="text-danger text-center mb-3"></div>

        <button id="login"
                class="btn btn-primary-custom w-100 py-2 mb-3">
          Iniciar Sesión
        </button>

        <div class="text-center">
          <a href="index.html"
             style="color:#2F7D32; text-decoration:none;">
            Volver al inicio
          </a>
        </div>

      </form>

    </div>

  </div>

  <!-- Footer coherente -->
  <footer class="text-center p-3 bg-white border-top text-muted">
    © 2026 Certificación - Sistema Institucional
  </footer>
  <script src="./assets/libs/jquery/dist/jquery.min.js"></script>
  <script src="./assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <!-- solar icons -->
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>

<script>

    const boton = document.getElementById("login");
    
    boton.addEventListener("click", (event)=>{
        event.preventDefault(); // Evita que el formulario se envíe de la forma tradicional
        // lo que que quiero que se ejecute cuando en el boton hagan click
        // URL del endpoint de autenticación en el servidor
        const loginUrl = "https://avisena-2trv.onrender.com/access/token";

        let correo = document.getElementById("username-input").value;
        let contrasenia = document.getElementById("password-input").value;

        // Crear objeto URLSearchParams para enviar datos como formulario
        const formData = new URLSearchParams();

        // Agregar credenciales al formulario
        formData.append("username", correo);  // Email del usuario
        formData.append("password", contrasenia); // Contraseña del usuario

        // Realizar petición HTTP POST al servidor
        fetch(loginUrl, {
            method: "POST",  // Método HTTP para enviar datos
            headers: {
                // Especifica que enviamos datos de formulario codificados en URL
                "Content-Type": "application/x-www-form-urlencoded",
                // Especifica que esperamos recibir JSON como respuesta
                "accept": "application/json"
            },
            body: formData  // Datos del formulario a enviar
        })
        .then(response => {
            // Verificar si la respuesta fue exitosa (status 200-299)
            if (!response.ok) {
                // Si hay error, convertir respuesta a JSON y lanzar excepción
                return response.json().then(err => { throw err });
            }
            // Si todo está bien, convertir respuesta a JSON
            return response.json();
        })
        .then(data => {
            // Manejar respuesta exitosa del servidor
            console.log("Login exitoso:", data);
            
            // Guardar token de acceso en localStorage del navegador
            localStorage.setItem("access_token", data.access_token);
            
            // Guardar información del usuario en localStorage (convertida a JSON)
            localStorage.setItem("user", JSON.stringify(data.user));

            // REDIRECCIÓN DESPUÉS DEL LOGIN EXITOSO
            // Opción 1: Redirección inmediata
            window.location.href = "index.html";
            
            // Opción 2: Reemplazar la página actual (no permite volver atrás)
            // window.location.replace("dashboard.html");
        })
        .catch(error => {
            // Manejar cualquier error que ocurra durante el proceso
            console.error("Error en login:", error);
            const mensaje = document.getElementById("error-message");
            mensaje.innerHTML = error.detail;
        });
    });

  </script>
</body>
</html>
